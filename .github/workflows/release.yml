name: Create Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog section for this version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          awk "/^## \[$version\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            | sed '/^$/N;/^\n$/d' \
            > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog entry found for version $version." > release_notes.md
          fi

      - name: Build release archive
        run: |
          version="${{ steps.version.outputs.version }}"
          dir="ring-off-v${version}"
          mkdir -p "${dir}/config"
          cp docker-compose.yml "${dir}/"
          cp .env.example       "${dir}/"
          cp config/mosquitto.conf       "${dir}/config/"
          cp config/go2rtc.yaml.example  "${dir}/config/"
          cp config/ring-mqtt-init.sh    "${dir}/config/"
          zip -r "${dir}.zip" "${dir}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: ring-off-v${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
